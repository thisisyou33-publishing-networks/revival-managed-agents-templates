id: data-analyst
base_agent: waverunner
description: "Data analyst agent focused on business intelligence and analysis using the Northwind dataset. Answers complex business questions like 'Who is my biggest customer?' and runs predictive models."
tools:
  - type: code_execution
  - type: google_search
environment:
  type: "remote"
  sources: []
examples:
  - title: "Biggest Customer"
    prompt: "Who is my biggest customer?"
  - title: "Supplier Loss"
    prompt: "What happens if I lost my biggest supplier next month?"
  - title: "Revenue Forecast"
    prompt: "Predict next month's revenue."

id: ai-radio
base_agent: antigravity-preview-05-2026
description: "Agent that turns any content source into a radio show — with a host, callers from around the world, generated speech with telephone effects, background music, and a polished final audio file."
tools:
  - type: google_search
  - type: code_execution
environment:
  type: "remote"
  sources: []
examples:
  - title: "Daily Hacker Bites"
    prompt: "Generate a 3-minute radio show called Daily Hacker Bites based on top Hacker News stories."
  - title: "GitHub Roundtable for AlphaFold 3"
    prompt: "Generate a 3-minute radio with a roundtable concept, educating listeners about https://github.com/google-deepmind/alphafold3."
  - title: "McLaren F1 Review"
    prompt: "Generate a 3-minute sports debate about the performance of the F1 McLaren Team in the most recent Grand Prix."

id: repo-maintainer
base_agent: antigravity-preview-05-2026
description: "Analyzes your codebase to identify issues, answer questions, and generate bug-fixing patches."
tools:
  - type: code_execution
environment:
  type: "remote"
  sources: []
  network:
    allowlist:     
      - domain: "github.com"
      - domain: "api.github.com"
examples:
  - title: "Repo Overview"
    prompt: "Clone https://github.com/googleapis/python-genai and give me an overview of the repository structure and README."
  - title: "Fix Critical Issue"
    prompt: "Clone https://github.com/googleapis/python-genai, find the most critical open issue and generate a .patch file to fix it."
  - title: "Top Issues"
    prompt: "Clone https://github.com/googleapis/python-genai and tell me what the top issues are."
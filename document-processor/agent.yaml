id: reconciliation-agent
base_agent: antigravity-preview-05-2026
description: "Reconciles expenses and invoices, automatically identifying and flagging discrepancies."
instructions: 'Reconcile expenses in expenses.csv with invoices in the workspace. Flag all discrepancies.'
tools:
  - type: code_execution
environment:
  type: "remote"
  sources:
    - type: "gcs"
      source: "gs://templates-data/document-processor"
      target: ".agents/workspace"
  network:
    allowlist:
      - domain: "www.wikidata.org"    
      - domain: "fonts.googleapis.com"
      - domain: "fonts.gstatic.com"      
      - domain: "pypi.org"
      - domain: "files.pythonhosted.org"
examples:
  - title: "Reconcile Expenses"
    prompt: "Reconcile expenses in expenses.csv with the invoices and flag all discrepancies."
  - title: "Unmatched Invoices"
    prompt: "Which invoices don't match any expense record?"
  - title: "Expenses by Category"
    prompt: "Summarize the total expenses by category."

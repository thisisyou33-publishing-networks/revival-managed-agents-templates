id: customer-support
base_agent: antigravity-preview-05-2026
description: "Scans any website to build a custom knowledge base and answer support questions using that content."
tools:
  - type: code_execution
  - type: google_search
environment:
  type: "remote"
  sources: []
examples:
  - title: "Gemini API Support Bot"
    prompt: "Index the Gemini API docs at ai.google.dev/gemini-api/docs and answer questions about rate limits, pricing, and available models."
  - title: "FastAPI Support Bot"
    prompt: "Index the FastAPI docs at fastapi.tiangolo.com and build a Q&A tool."
  - title: "Firebase Support Bot"
    prompt: "Index the Firebase documentation at https://firebase.google.com/docs and answer questions about Firestore security rules."

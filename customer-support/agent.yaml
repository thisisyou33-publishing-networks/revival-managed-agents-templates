id: customer-support
base_agent: waverunner
description: "Website-powered customer support agent. Provide a URL, the agent scans and analyzes the site to build a local support corpus, and answers questions using that corpus."
tools:
  - type: code_execution
  - type: google_search
environment:
  type: "remote"
  sources: []
examples:
  - title: "Gemini Docs Support (API Key)"
    prompt: "Scan https://ai.google.dev/gemini-api/docs and tell me how to get an API key."
  - title: "Gemini Docs Support (Rate Limits)"
    prompt: "Scan https://ai.google.dev/gemini-api/docs and tell me what the rate limits are."
  - title: "Gemini Docs Support (Models)"
    prompt: "Scan https://ai.google.dev/gemini-api/docs and summarize the available models."
